<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141618"/>
      <stop offset="55%" stop-color="#0c0d0f"/>
      <stop offset="100%" stop-color="#08090a"/>
    </linearGradient>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dce2ea"/>
      <stop offset="35%" stop-color="#9aa5b3"/>
      <stop offset="70%" stop-color="#6d7783"/>
      <stop offset="100%" stop-color="#b8c0cb"/>
    </linearGradient>
    <linearGradient id="steelDark" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#7a8490"/>
      <stop offset="100%" stop-color="#4a525c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e2126"/>
      <stop offset="100%" stop-color="#121416"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="1050" cy="520" rx="520" ry="280" fill="#1a1f28" opacity=".45"/>
  <!-- floor -->
  <path fill="url(#floor)" d="M0 620 1600 620 1600 900 0 900Z"/>
  <path stroke="#2a3038" stroke-width="1" opacity=".6" d="M120 620H1480M200 660H1400M280 700H1320"/>
  <!-- main hall isometric structure -->
  <g filter="url(#glow)" transform="translate(520 140)">
    <!-- back frame -->
    <path fill="url(#steelDark)" d="M40 380 40 180 420 60 420 260Z"/>
    <path fill="url(#steel)" opacity=".85" d="M420 60 780 200 780 400 420 260Z"/>
    <path fill="url(#steelDark)" d="M780 200 1120 80 1120 280 780 400Z"/>
    <!-- columns -->
    <path fill="url(#steel)" d="M40 380 68 368 68 168 40 180Z"/>
    <path fill="url(#steelDark)" d="M392 268 420 260 420 60 392 68Z"/>
    <path fill="url(#steel)" d="M752 398 780 400 780 200 752 192Z"/>
    <path fill="url(#steelDark)" d="M1092 278 1120 280 1120 80 1092 88Z"/>
    <!-- ridge -->
    <path fill="url(#steel)" d="M392 68 580 10 968 130 780 200Z"/>
    <path fill="url(#shine)" opacity=".35" d="M392 68 580 10 968 130 780 200Z"/>
    <!-- rafters -->
    <g stroke="url(#steel)" stroke-width="5" stroke-linecap="square" opacity=".9">
      <path d="M120 200 420 100"/>
      <path d="M200 230 500 130"/>
      <path d="M280 260 580 160"/>
      <path d="M360 290 660 190"/>
      <path d="M440 320 740 220"/>
      <path d="M520 350 820 250"/>
      <path d="M600 380 900 280"/>
    </g>
    <!-- front frame -->
    <path fill="url(#steel)" d="M40 380 420 260 420 460 40 580Z"/>
    <path fill="url(#steelDark)" d="M420 260 780 400 780 600 420 460Z"/>
    <path fill="url(#steel)" d="M780 400 1120 280 1120 480 780 600Z"/>
    <!-- purlins -->
    <g stroke="#8e98a6" stroke-width="2.5" opacity=".7">
      <path d="M80 340 1080 200"/>
      <path d="M80 365 1080 225"/>
      <path d="M80 390 1080 250"/>
      <path d="M80 415 1080 275"/>
    </g>
    <!-- bracing -->
    <g stroke="#6a7380" stroke-width="2" opacity=".65">
      <path d="M68 168 392 268"/>
      <path d="M68 368 392 268"/>
      <path d="M752 192 1092 278"/>
      <path d="M752 398 1092 278"/>
    </g>
    <!-- highlight edge -->
    <path stroke="url(#shine)" stroke-width="1.5" opacity=".5" fill="none" d="M580 10 968 130 1120 280 780 400 420 260 40 380 40 180 392 68Z"/>
  </g>
  <!-- subtle particles -->
  <circle cx="1280" cy="200" r="2" fill="#fff" opacity=".12"/>
  <circle cx="1350" cy="320" r="1.5" fill="#fff" opacity=".08"/>
  <circle cx="900" cy="150" r="1" fill="#fff" opacity=".1"/>
</svg>
